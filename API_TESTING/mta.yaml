_schema-version: 3.3.0
ID: API_TESTING
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: API_TESTING-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: API_TESTING-auth
      - name: API_TESTING-db

  - name: API_TESTING-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 256M
    build-parameters:
      builder: custom
      commands:
        - npm install
        - mkdir -p resources
        - cp ../app/index.html resources/
        - cp ../app/style.css resources/
        - cp ../app/script.js resources/
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: API_TESTING-auth

  - name: API_TESTING-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
      memory: 100M
    requires:
      - name: API_TESTING-db

resources:
  - name: API_TESTING-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: API_TESTING-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          redirect-uris:
            - https://*.cfapps.us10-001.hana.ondemand.com/**
          credential-types:
            - "binding-secret"
            - "x509"

  - name: API_TESTING-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
