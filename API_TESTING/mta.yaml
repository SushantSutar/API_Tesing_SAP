_schema-version: 3.3.0
ID: API_TESTING
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: API_TESTING-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: API_TESTING-auth

resources:
  - name: API_TESTING-auth
    type: org.cloudfoundry.managed-service

    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

      config:
        xsappname: API_TESTING-${org}-${space}
        tenant-mode: dedicated

        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509