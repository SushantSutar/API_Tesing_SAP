<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Testing Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS: reads Excel in the browser before sending batch to backend -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <h1>API Testing Dashboard 🚀</h1>
  <div class="card">
    <div class="input-group">
      <input type="file" id="file" accept=".xlsx,.xls" />
      <input type="text" id="clientId" placeholder="Client ID" />
      <input type="text" id="clientSecret" placeholder="Client Secret" />
      <input type="text" id="tokenUrl" placeholder="Token URL" />
    </div>
    <button type="button" id="runTestsBtn" onclick="runTests()" class="btn-primary">Run Tests</button>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
  <div id="overallSummary"></div>
  <div id="sheetTabs"></div>
  <div id="report"></div>
  <div class="download-group card">
    <button class="btn-success" onclick="downloadFullReport('txt')">Download Full Report (.txt)</button>
    <button class="btn-success" onclick="downloadFullReport('html')">Download Full Report (.html)</button>
    <button class="btn-info" onclick="downloadCurrentSheet('txt')">Download Current Sheet (.txt)</button>
    <button class="btn-info" onclick="downloadCurrentSheet('html')">Download Current Sheet (.html)</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
